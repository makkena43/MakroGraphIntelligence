    - "fab"
    - "solar"
    - "renewable energy"
    - "green hydrogen"
    - "wind"
    - "railway"
    - "metro"
    - "vande bharat"
    - "defence"
    - "HAL"
    - "BEL"
    - "DRDO"
    - "electric vehicle"
    - "EV"
    - "battery"
    - "infrastructure"
    - "capex"
    - "5G"
    - "telecom"
    - "startup"
    - "digital india"

# Invest India — sector reports and investment announcements
# No API key required. Public web scraping.
invest_india:
  enabled: true
  start_date: "2020-01-01"
  max_results_per_run: 200
  api_delay_seconds: 1.0
  sections:
    - "sector-reports"            # crawls /sectors index -> each sector sub-page for PDFs
